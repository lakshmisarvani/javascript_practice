<!DOCTYPE html>
<html>
<head>
  <title>Throttle Example</title>
</head>
<body>
  <input type="text" id="search" placeholder="Type something..." />
  <p>Check console output</p>

  <script>
    // Throttle function
    function throttle(func, limit) {
      let lastFunc;
      let lastRan;

      return function (...args) {
        const context = this;
        if (!lastRan) {
          func.apply(context, args);
          lastRan = Date.now();
        } else {
          clearTimeout(lastFunc);
          lastFunc = setTimeout(function () {
            if (Date.now() - lastRan >= limit) {
              func.apply(context, args);
              lastRan = Date.now();
            }
          }, limit - (Date.now() - lastRan));
        }
      };
    }

    function handleSearch(event) {
      console.log("Searching for:", event.target.value);
    }

    const throttledSearch = throttle(handleSearch, 5000); // at most once per second

    document
      .getElementById("search")
      .addEventListener("input", throttledSearch);
  </script>
</body>
</html>
