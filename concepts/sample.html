<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Render-Blocking Example</title>
  <!-- This CSS blocks rendering until it's fully loaded -->
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Hello World!</h1>
  <p>This text will not appear until styles.css is loaded.</p>
</body>
</html>
