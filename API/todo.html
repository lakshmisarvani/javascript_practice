<!DOCTYPE html>
<html>
<head>
    <title>Todo List</title>
    <style>
        .completed {
            text-decoration: line-through;
            color: gray;
        }
    </style>
</head>
<body>

<h2>Todo List</h2>

<input type="text" id="todoInput" placeholder="Enter todo">
<button id="addBtn">Add</button>

<ul id="todoList"></ul>

<script>
const input = document.getElementById("todoInput");
const addBtn = document.getElementById("addBtn");
const list = document.getElementById("todoList");


// 🔹 Function to create Todo Item in DOM
function createTodoItem(text, completed = false) {
    const li = document.createElement("li");
    li.textContent = text;

    if (completed) {
        li.classList.add("completed");
    }

    // Toggle complete
    li.addEventListener("click", () => {
        li.classList.toggle("completed");
    });

    // Delete button
    const deleteBtn = document.createElement("button");
    deleteBtn.textContent = "Delete";

    deleteBtn.addEventListener("click", (e) => {
        e.stopPropagation();
        li.remove();
    });

    li.appendChild(deleteBtn);
    list.appendChild(li);
}


// 🔹 Fetch Todos from Dummy API
async function loadTodos() {
    try {
        const res = await fetch(
            "https://jsonplaceholder.typicode.com/todos?_limit=5"
        );

        if (!res.ok) throw new Error("Failed to fetch todos");

        const todos = await res.json();

        todos.forEach(todo => {
            createTodoItem(todo.title, todo.completed);
        });

    } catch (err) {
        console.log(err.message);
    }
}


// 🔹 Add New Todo Manually
addBtn.addEventListener("click", () => {
    const text = input.value.trim();
    if (!text) return;

    createTodoItem(text);
    input.value = "";
});


// Load API Todos when page loads
loadTodos();

</script>

</body>
</html>
